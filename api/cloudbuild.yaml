# =============================================================================
# cloudbuild.yaml
# =============================================================================
# Builds the Docker image, pushes to Artifact Registry, and deploys to
# Cloud Run in project options-trader-493420.
#
# Trigger manually or via a Cloud Build trigger on push to main.
#
# Required Cloud Build substitution variables (set in trigger settings):
#   _REGION         — e.g. us-central1
#   _SERVICE        — e.g. swing-options-api
#   _ARTIFACT_REPO  — e.g. swing-options-api  (Artifact Registry repo name)
#
# Required Secret Manager secrets (referenced as env vars at runtime):
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY
#   SUPABASE_ANON_KEY
#   FMP_API_KEY
#   PYTHON_API_SECRET
# =============================================================================

substitutions:
  _REGION: us-central1
  _SERVICE: swing-options-api
  _ARTIFACT_REPO: swing-options-api
  # _TAG is overridden by deploy.sh (git short-SHA) or left as "latest" for
  # trigger-based builds that set COMMIT_SHA separately.
  _TAG: latest

steps:
  # ── 1. Build Docker image ──────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE}:${_TAG}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE}:latest
      - ./api
    dir: .

  # ── 2. Push to Artifact Registry ──────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE}

  # ── 3. Deploy to Cloud Run ─────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE}:${_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --timeout=300
      - --set-secrets=SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_SERVICE_KEY=SUPABASE_SERVICE_KEY:latest,SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,FMP_API_KEY=FMP_API_KEY:latest,PYTHON_API_SECRET=PYTHON_API_SECRET:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE}:${_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
